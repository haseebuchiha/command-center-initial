name: launchbased-command-center
region: nyc
services:
  - name: web
    github:
      repo: launchbased/launchbased-command-center
      branch: main
      deploy_on_push: true
    build_command: npm install && npm run build
    run_command: npm start
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        value: production
